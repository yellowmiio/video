<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё видео</title>

    <style>
        body {
            margin: 0;
            background-color: #c7d3db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        video {
            width: 90%;       /* адаптивно под телефон */
            max-width: 500px; /* ограничение для больших экранов */
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
     

        <video controls>
            <source src="video.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

</body>
</html>
