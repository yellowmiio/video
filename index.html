<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        body {
            margin: 0;
            background-color: #c7d3db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        video {
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
       
       <video controls width="90%">
    <source src="video.mp4" type="video/mp4">
</video>
         
    </div>

</body>
</html>
